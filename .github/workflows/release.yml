# IMPORTANT: This workflow is loaded from the COMMIT THE RELEASE TAG POINTS TO (not the default branch).
# So when you "Publish release" for tag v1.0.0, GitHub runs THIS file from whatever commit v1.0.0 points to.
# If that tag was created earlier, you get an old version of this file. Fix: create a NEW tag from current
# "next" (e.g. v1.0.1 or recreate v1.0.0 from next), then create/publish the release for that new tag.
name: Release

on:
  release:
    types: [published]

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from release
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Merge next into main and set version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin next main 2>/dev/null || true
          git checkout -B main origin/next 2>/dev/null || git checkout -B main next
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          " "$VERSION"
          git add package.json
          git diff --staged --quiet || (git commit -m "chore(release): $VERSION [skip ci]" && git push --force origin main)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Storybook
        run: npm run build:storybook

      - name: Deploy Storybook to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          destination_dir: .
