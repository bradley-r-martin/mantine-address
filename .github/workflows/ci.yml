name: CI

on:
  pull_request:
    branches: [next]

defaults:
  run:
    shell: bash

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          BRANCH="${{ github.head_ref }}"
          if [ -z "$BRANCH" ]; then
            echo "::error::Could not determine head branch name"
            exit 1
          fi
          if [ ! -d "openspec/changes/$BRANCH" ]; then
            echo "::error::Branch name '$BRANCH' must match an OpenSpec change. Create openspec/changes/$BRANCH/ (e.g. run 'openspec new change $BRANCH') or use a branch named after an existing change (e.g. setup-library)."
            exit 1
          fi
          echo "✓ Branch '$BRANCH' matches OpenSpec change openspec/changes/$BRANCH/"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

  no-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} 2>/dev/null | grep -qx 'package.json'; then
            if git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- package.json | grep -q '^[+-].*"version"'; then
              echo "::error::package.json version must not be changed in a PR. Bump version only when creating a GitHub Release."
              exit 1
            fi
          fi
          echo "✓ package.json version unchanged or file not modified"

  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} 2>/dev/null | grep -q '^openspec/changes/'; then
            for dir in openspec/changes/*/; do
              [ -d "$dir" ] || continue
              if [ -f "${dir}tasks.md" ]; then
                echo "✓ OpenSpec change $(basename "$dir") has tasks.md"
              else
                echo "::error::OpenSpec change $(basename "$dir") must have tasks.md"
                exit 1
              fi
            done
          else
            echo "No openspec/changes modified; skipping OpenSpec check"
          fi
